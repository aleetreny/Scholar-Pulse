name: Deploy ScholarPulse to Pages

on:
  push:
    branches:
      - main
  schedule:
    # Refresh feed snapshots ~every 6h. arXiv announces new papers once per
    # weekday around 00:00 UTC; the 02:20 run picks the fresh batch up.
    - cron: "20 2,8,14,20 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/dashboard-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/dashboard-web

      - name: Build feed snapshots from arXiv
        run: node scripts/build-feed-snapshots.mjs
        working-directory: apps/dashboard-web

      - name: Build static site
        run: npm run build
        working-directory: apps/dashboard-web
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/dashboard-web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
