name: scholarpulse
prefect-version: 2.19.8
deployments:
  - name: daily-ingestion
    entrypoint: pipelines/orchestration/flows.py:daily_ingestion_flow
    schedule:
      cron: "0 2 * * *"
      timezone: "UTC"
    parameters: {}
  - name: embedding-exchange
    entrypoint: pipelines/orchestration/flows.py:embedding_exchange_flow
    parameters: {}
  - name: analytics-publish
    entrypoint: pipelines/orchestration/flows.py:analytics_publish_flow
    parameters: {}
  - name: weekly-local-refresh
    entrypoint: pipelines/orchestration/flows.py:weekly_local_refresh_flow
    schedule:
      cron: "0 2 * * 0"
      timezone: "UTC"
    parameters:
      batch_size: 16
      chunk_size: 10
      sample_points: 150000
      density_bins: 160
      similarity_pca_dim: 256
      enrichment_max_papers: 200
